<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku 6×6</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<canvas id="confetti"></canvas>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Nuevo Sudoku</h2>
    <p class="modal-sub">Elige la dificultad</p>
    <div class="modal-levels">

      <button class="lvl-btn" data-level="easy">
        <span class="lname">Fácil</span>
        <span class="lvl-dots"><span class="dot on"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
        <span class="ldesc">más pistas</span>
      </button>

      <button class="lvl-btn" data-level="medium">
        <span class="lname">Medio</span>
        <span class="lvl-dots"><span class="dot on"></span><span class="dot on"></span><span class="dot"></span><span class="dot"></span></span>
        <span class="ldesc">equilibrado</span>
      </button>

      <button class="lvl-btn" data-level="hard">
        <span class="lname">Difícil</span>
        <span class="lvl-dots"><span class="dot on"></span><span class="dot on"></span><span class="dot on"></span><span class="dot"></span></span>
        <span class="ldesc">pocas pistas</span>
      </button>

      <button class="lvl-btn" data-level="max" id="btn-max-level">
        <span class="lname">Máxima</span>
        <span class="lvl-dots"><span class="dot on"></span><span class="dot on"></span><span class="dot on"></span><span class="dot on"></span></span>
        <span class="ldesc">búsqueda activa</span>
      </button>
    </div>

    <div class="max-expand" id="max-expand">
      <div class="intensity-block">
        <label>Intentos de búsqueda</label>
        <div class="int-row">
          <input type="range" id="int-slider" min="5" max="4000" step="5" value="20">
          <span class="int-val" id="int-display">20 intentos</span>
        </div>
        <button class="btn-gen" id="btn-gen-max">Buscar puzzle →</button>
      </div>
    </div>

    <button class="modal-cancel" id="modal-cancel">cancelar</button>
  </div>
</div>

<!-- MAIN -->
<header>
  <h1>Sudoku</h1>
  <p>6 × 6 — grupos de 2×3</p>
</header>

<div class="card">
  <div class="diff-row">
    <label>Nivel:</label>
    <span id="diff-label">Medio</span>
  </div>

  <div id="grid"></div>

  <div class="inline-status" id="inline-status"></div>

  <div class="actions">
    <button class="btn btn-secondary" id="btn-hint">Pista</button>
    <button class="btn btn-primary"   id="btn-check">Verificar</button>
    <button class="btn btn-secondary" id="btn-reset">Reiniciar</button>
  </div>

  <div id="message"></div>

  <!-- CODE ROW -->
  <div class="code-row">
    <span class="code-lbl">Código</span>
    <input type="text" id="code-input" maxlength="17" spellcheck="false"
           autocomplete="off" placeholder="—">
    <button class="code-btn" id="btn-copy">Copy</button>
    <button class="code-btn" id="btn-load">Load</button>
  </div>

  <!-- METRICS -->
  <div class="metrics-panel" id="mp">
    <hr class="mp-divider">
    <div class="score-row">
      <span class="score-num" id="mp-score">—</span>
      <span class="score-badge" id="mp-badge">—</span>
    </div>

    <div class="metrics-rows">
      <!-- P -->
      <div class="mrow" title="Pistas dadas: menos pistas = más difícil">
        <span class="mname">Pistas dadas</span>
        <div class="bar-wrap"><div class="bar" id="bar-P" style="background:#c8922a"></div></div>
        <span class="mval" id="val-P">—</span>
        <span class="mpts" id="pts-P">—</span>
      </div>
      <!-- S -->
      <div class="mrow" title="Movimientos directos: celdas resolubles con lógica simple">
        <span class="mname">Mov. directos</span>
        <div class="bar-wrap"><div class="bar" id="bar-S" style="background:#3a5fa0"></div></div>
        <span class="mval" id="val-S">—</span>
        <span class="mpts" id="pts-S">—</span>
      </div>
      <!-- D -->
      <div class="mrow" title="Profundidad de bifurcación: niveles de suposición necesarios">
        <span class="mname">Profundidad</span>
        <div class="bar-wrap"><div class="bar" id="bar-D" style="background:#7d3c98"></div></div>
        <span class="mval" id="val-D">—</span>
        <span class="mpts" id="pts-D">—</span>
      </div>
      <!-- C -->
      <div class="mrow" title="Candidatos promedio por celda vacía: más candidatos = más ambigüedad">
        <span class="mname">Cand. promedio</span>
        <div class="bar-wrap"><div class="bar" id="bar-C" style="background:#148f77"></div></div>
        <span class="mval" id="val-C">—</span>
        <span class="mpts" id="pts-C">—</span>
      </div>
      <!-- M -->
      <div class="mrow" title="Candidato mínimo: sin celdas fáciles al inicio">
        <span class="mname">Cand. mínimo</span>
        <div class="bar-wrap"><div class="bar" id="bar-M" style="background:#c0392b"></div></div>
        <span class="mval" id="val-M">—</span>
        <span class="mpts" id="pts-M">—</span>
      </div>
    </div>

    <div class="search-status" id="mp-status"></div>
  </div>
</div>

<footer>
  <a href="https://github.com/AlejandroPu/claude-pair-sudoku" target="_blank" rel="noopener">
    Link a la página del proyecto
  </a>
</footer>

<script src="js/app.js"></script>
</body>
</html>
